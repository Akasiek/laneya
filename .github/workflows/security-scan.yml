name: Security scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly published CVEs
    - cron: "0 8 * * 1"

jobs:
  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t laneya:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: laneya:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1" # fail the job if CRITICAL or HIGH CVEs are found

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        # Run even if trivy found vulnerabilities (so results are always uploaded)
        if: always()
        with:
          sarif_file: trivy-results.sarif

