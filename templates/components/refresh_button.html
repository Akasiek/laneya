<button
    id="refresh-btn"
    hx-post="/api/feed/refresh"
    hx-swap="none"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium
           bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700
           text-zinc-700 dark:text-zinc-300 transition hover:scale-105 active:scale-95"
>
    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
    </svg>
    Refresh
</button>
<script>
    document.getElementById('refresh-btn').addEventListener('click', function () {
        const icon = this.querySelector('svg');
        icon.classList.add('animate-[spin_0.6s_linear_1]');
        icon.addEventListener('animationend', () => icon.classList.remove('animate-[spin_0.6s_linear_1]'), { once: true });
    });
</script>
