<tr id="channel-row-{{ channel.id }}"
    class="bg-white dark:bg-zinc-950 hover:bg-zinc-50 dark:hover:bg-zinc-900 transition">
    <td class="px-4 py-3 font-medium">{{ channel.channel_name }}</td>
    <td class="px-4 py-3 text-zinc-500 dark:text-zinc-400 font-mono text-xs">{{ channel.channel_id }}</td>
    <td class="px-4 py-3 text-zinc-500 dark:text-zinc-400">{{ channel.created_at }}</td>
    <td class="px-4 py-3 align-middle">
        <div class="flex gap-2 justify-end">
            <button
                hx-get="/api/channels/{{ channel.id }}/edit"
                hx-target="#channel-row-{{ channel.id }}"
                hx-swap="outerHTML"
                class="px-3 py-1 rounded-md text-xs font-medium bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200
            dark:hover:bg-zinc-700 transition"
            >
                Edit
            </button>
            <button
                hx-delete="/api/channels/{{ channel.id }}"
                hx-target="#channel-row-{{ channel.id }}"
                hx-swap="outerHTML"
                hx-confirm="Delete {{ channel.channel_name }}?"
                class="px-3 py-1 rounded-md text-xs font-medium bg-red-100 dark:bg-red-900/30 text-red-600
            dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/60 transition"
            >
                Delete
            </button>
        </div>
    </td>
</tr>
