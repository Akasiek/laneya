<tr id="channel-row-{{ channel.id }}" class="bg-amber-50 dark:bg-amber-900/10">
    <td class="px-4 py-2" colspan="4">
        <form hx-put="/api/channels/{{ channel.id }}"
              hx-target="#channel-row-{{ channel.id }}"
              hx-swap="outerHTML"
              class="flex flex-wrap gap-2 items-center">

            <input type="text"
                   name="channel_name"
                   value="{{ channel.channel_name }}"
                   required
                   class="px-3 py-1.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 w-44" />

            <input type="text"
                   name="channel_id"
                   value="{{ channel.channel_id }}"
                   required
                   class="px-3 py-1.5 rounded-lg border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-amber-500 w-64" />

            <button type="submit"
                    class="px-3 py-1.5 rounded-lg bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold transition">
                Save
            </button>

            <button type="button"
                    hx-get="/api/channels/{{ channel.id }}/row"
                    hx-target="#channel-row-{{ channel.id }}"
                    hx-swap="outerHTML"
                    class="px-3 py-1.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-xs font-medium transition">
                Cancel
            </button>

            {% if let Some(err) = error %}
            <p class="w-full text-red-500 dark:text-red-400 text-xs mt-1">{{ err }}</p>
            {% endif %}
        </form>
    </td>
</tr>
