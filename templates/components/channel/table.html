<div class="rounded-xl border border-zinc-200 dark:border-zinc-800 overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-zinc-100 dark:bg-zinc-900 text-zinc-500 dark:text-zinc-400 text-left">
        <tr>
            <th class="px-4 py-3 font-medium">Name</th>
            <th class="px-4 py-3 font-medium">Channel ID</th>
            <th class="px-4 py-3 font-medium">Added</th>
            <th class="px-4 py-3"></th>
        </tr>
        </thead>
        <tbody id="channels-list" class="divide-y divide-zinc-100 dark:divide-zinc-800">
        {% for channel in channels %}
        {% include "components/channel/row.html" %}
        {% endfor %}
        </tbody>
    </table>
    {% if channels.is_empty() %}
    <p class="text-center text-zinc-500 dark:text-zinc-400 py-10 text-sm">No channels yet. Add one above.</p>
    {% endif %}
</div>
